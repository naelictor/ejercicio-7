<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechStore</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-dark text-white">
    <main class="container d-flex jutify-content-center aling-items-center vh-100">
        <section class="col-12 col-md-6 col-lg-4">
            <article class="bg-light text-dark p-5 rounded-4 shadow-lg">
                <header class="text-center mb-4">
                    <h1 class="h3 text-primary"><i class="bi bi-box-seam"></i> TechStore</h1>
                    <p class="text-muted small">Ingresa tus credenciales</p>
                </header>
                <form action="inventario.html" method="GET">
                    <fieldset>
                        <legend class="visually-hidden">Formulario de acceso</legend>
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-evelope"></i></span>
                                <input type="email" id="email" class="form-control" placeholder="admin@techstore.com" required>
                                
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" class="form-control" placeholder="........." required>

                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Entrar al Sistema</button>
                    </fieldset>
                </form>
            </article>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
